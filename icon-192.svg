<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1e2a"/>
      <stop offset="1" stop-color="#0d0f14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  
  <!-- Border -->
  <rect x="3" y="3" width="186" height="186" rx="36" fill="none" stroke="#c9a84c" stroke-width="3"/>

  <!-- Blade -->
  <polygon points="96,28 103,58 103,118 89,118 89,58" fill="#f0cc6e"/>
  <!-- Blade tip -->
  <polygon points="96,18 103,42 89,42" fill="#f0cc6e"/>

  <!-- Crossguard -->
  <rect x="60" y="112" width="72" height="10" rx="5" fill="#c9a84c"/>

  <!-- Handle -->
  <rect x="90" y="122" width="12" height="34" fill="#7a5a28"/>

  <!-- Pommel -->
  <ellipse cx="96" cy="158" rx="10" ry="8" fill="#c9a84c"/>

  <!-- Bottom accent line -->
  <rect x="28" y="172" width="136" height="3" rx="1.5" fill="#c9a84c" opacity="0.6"/>
</svg>